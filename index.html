<style>
:root {
  --primary: #ff4fd8;
  --bg: #0a0a14;
  --card: #16162d;
  --text: #ffffff;
  --accent: #8a2be2;
  --success: #00ff88;
  --border: rgba(255, 255, 255, 0.1);
  --pix: #32BCAD;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ===== HEADER ===== */
header {
  background: #0a0a14; padding: 12px 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
}
.header-top { display: flex; align-items: center; gap: 10px; width: 100%; }
.logo { cursor: pointer; font-size: 20px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
.search-container { flex-grow: 1; position: relative; }
.search-container input {
  width: 100%; padding: 10px 10px 10px 35px; border-radius: 10px;
  border: 1px solid var(--border); background: #1c1c3a; color: #fff; font-size: 14px;
}
.search-container::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
.user-btn { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.nav-menu { display: flex; overflow-x: auto; gap: 15px; padding: 12px 0 0; scrollbar-width: none; }
.nav-menu::-webkit-scrollbar { display: none; }
.nav-item { color: #888; text-decoration: none; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
.nav-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

/* ===== VITRINE (2:3) ===== */
.container { max-width: 1200px; margin: 0 auto; padding-bottom: 80px; }
.products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; margin-top: 20px; }
@media (min-width: 768px) { .products-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }

.card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); position: relative; transition: 0.3s; }
.img-wrap { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #000; cursor: pointer; }
.card img { width: 100%; height: 100%; object-fit: cover; }
.card-info { padding: 12px; }
.card-info h3 { font-size: 12px; margin: 0; height: 34px; overflow: hidden; color: #fff; font-weight: 600; }
.price-tag { color: var(--primary); font-size: 16px; font-weight: 800; display: block; margin: 5px 0; }
.btn-card { background: #fff; color: #000; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: 800; font-size: 10px; cursor: pointer; }

/* ===== CARRINHO (AJUSTADO SEM NaN) ===== */
#carrinho { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: #0f0f1e; z-index: 4000; transition: 0.4s; display: flex; flex-direction: column; box-shadow: -10px 0 50px rgba(0,0,0,0.8); }
.cart-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
#listaCarrinho { flex: 1; overflow-y: auto; padding: 15px; }

.item-cart { display: flex; align-items: flex-start; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
.item-cart img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
.item-cart-info { flex: 1; min-width: 0; }
.item-cart-info h4 { margin: 0; font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.finish-toggle { display: flex; background: #000; padding: 3px; border-radius: 8px; margin-top: 5px; width: fit-content; border: 1px solid #333; }
.finish-toggle div { padding: 4px 8px; font-size: 8px; font-weight: 800; cursor: pointer; border-radius: 5px; opacity: 0.4; color: white; }
.finish-toggle .active { background: var(--primary); opacity: 1; }

.cart-footer { padding: 20px; background: #05050a; border-top: 2px solid var(--primary); overflow-y: auto; }
.checkout-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
.cart-input { width: 100%; background: #1c1c3a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; font-family: 'Montserrat'; }

/* ===== PERFIL & MODAL ===== */
#profilePage { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; overflow-y: auto; }
#productPage { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
.profile-card { background: #1c1c3a; padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 500px; width: 90%; border: 1px solid var(--border); }

/* AUXILIARES */
#cartBtn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; z-index: 2000; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; border: none; cursor: pointer; }
#cartCount { position: absolute; top: 5px; right: 5px; background: white; color: var(--primary); font-size: 10px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 3500; }
.btn-finalizar { background: #25d366; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; font-size: 15px; }
#toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--success); color: black; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 9999; display: none; }
</style>
</head>

let carrinho = []; let favoritos = [];
let usuario = { n: '', e: '', num: '', c: '', z: '' };

const database = [

function getEl(id) { return document.getElementById(id); }

function carregarTudo() {
  favoritos = JSON.parse(localStorage.getItem('iv_fav_v21')) || [];
  carrinho = JSON.parse(localStorage.getItem('iv_cart_v21')) || [];
  usuario = JSON.parse(localStorage.getItem('iv_user_v21')) || { n:'', e:'', num:'', c:'', z:'' };
  
  if(getEl('profNome')) getEl('profNome').value = usuario.n;
  if(getEl('profZap')) getEl('profZap').value = usuario.z;
  if(getEl('cartEnd')) getEl('cartEnd').value = usuario.e;
  if(getEl('cartNum')) getEl('cartNum').value = usuario.num;
  if(getEl('cartCep')) getEl('cartCep').value = usuario.c;

  renderizarProdutos(database); 
  renderizarCarrinho();
  atualizarLabels();
}

function salvarTudoAoDigitar() {
    usuario.n = getEl('profNome').value; usuario.z = getEl('profZap').value;
    usuario.e = getEl('cartEnd').value || getEl('profEnd').value || '';
    usuario.num = getEl('cartNum').value || getEl('profNum').value || '';
    usuario.c = getEl('cartCep').value || getEl('profCep').value || '';
    localStorage.setItem('iv_user_v21', JSON.stringify(usuario));
    atualizarLabels();
}

function atualizarLabels() {
    if(getEl('profileNameDisplay')) getEl('profileNameDisplay').innerText = usuario.n || "Visitante";
    if(getEl('avatarIcon')) getEl('avatarIcon').innerText = (usuario.n || "?").charAt(0).toUpperCase();
    if(getEl('cartEndResumo')) getEl('cartEndResumo').innerText = usuario.e ? `${usuario.e}, Nº ${usuario.num}` : "Defina seu endereço";
}

function renderizarProdutos(lista) {
  const grid = getEl('productGrid'); if(!grid) return;
  grid.innerHTML = '';
  lista.forEach(p => {
    const isFav = favoritos.includes(p.name);
    grid.innerHTML += `<div class="card"><div style="position:absolute;top:10px;right:10px;z-index:5;"><button onclick="toggleFav(this,'${p.name}')" style="background:rgba(0,0,0,0.4);border:none;color:${isFav?'#ff4fd8':'#fff'};font-size:22px;cursor:pointer;">❤️</button></div><div class="img-wrap" onclick="abrirPP(${p.id})"><img src="${p.img}" onerror="this.src='https://placehold.co/300x450?text=Indisponivel'"></div><div class="card-info"><h3>${p.name}</h3><span class="price-tag">R$ 23,90</span><button class="btn-card" onclick="addFinal(${p.id}, false)">ADICIONAR</button></div></div>`;
  });
}

function abrirPP(id) {
  const p = database.find(x => x.id === id);
  getEl('ppImg').src = p.img; getEl('ppTitle').innerText = p.name; getEl('ppDesc').innerText = p.desc;
  getEl('ppThumbs').innerHTML = `<img src="${p.img}" class="active" onclick="getEl('ppImg').src=this.src"><img src="${FOTO_TAMANHO_G}" onclick="getEl('ppImg').src=this.src">`;
  getEl('ppAddBtn').onclick = () => { addFinal(p.id, false); fecharPP(); };
  getEl('productPage').style.display = 'flex';
}
function fecharPP() { getEl('productPage').style.display = 'none'; }

function addFinal(id, isP) {
  const p = database.find(x => x.id === id); const ck = id + (isP ? '_P' : '_S');
  const exist = carrinho.find(c => c.ck === ck);
  if(exist) exist.q++; else carrinho.push({ ...p, ck, q:1, isP, pFinal: isP ? 28.9 : 23.9 });
  localStorage.setItem('iv_cart_v21', JSON.stringify(carrinho)); renderizarCarrinho(); sToast();
}

function renderizarCarrinho() {
  const lista = getEl('listaCarrinho'); if(!lista) return;
  lista.innerHTML = ''; let sub = 0;
  carrinho.forEach(item => {
    sub += (item.pFinal || 23.9) * item.q;
    lista.innerHTML += `<div class="item-cart"><img src="${item.img}"><div style="flex:1"><h4>${item.name}</h4><div class="finish-toggle"><div class="${!item.isP?'active':''}" onclick="mudarT('${item.ck}', false)">Papel</div><div class="${item.isP?'active':''}" onclick="mudarT('${item.ck}', true)">Premium</div></div><div style="display:flex;justify-content:space-between;margin-top:8px"><div><button onclick="uQ('${item.ck}',-1)">-</button><span style="margin:0 10px">${item.q}</span><button onclick="uQ('${item.ck}',1)">+</button></div><b>R$ ${(item.pFinal * item.q).toFixed(2)}</b></div></div></div>`;
  });
  upT();
}
function mudarT(k, v) { const i = carrinho.find(x => x.ck === k); i.isP = v; i.pFinal = v ? 28.9 : 23.9; renderizarCarrinho(); }
function uQ(k, n) { const i = carrinho.find(x => x.ck === k); i.q += n; if(i.q <= 0) carrinho = carrinho.filter(x => x.ck !== k); renderizarCarrinho(); }
function calcFrete() { if(!usuario.c) return alert("Preecha o CEP"); getEl('resFrete').style.display='block'; upT(); }
function upT() { 
  let s = carrinho.reduce((a,b)=> a + (b.pFinal * b.q), 0);
  let f = getEl('resFrete').style.display==='block' ? parseFloat(document.querySelector('input[name="f"]:checked').value) : 0;
  getEl('totalTxt').innerText = `R$ ${(s+f).toFixed(2).replace('.',',')}`; getEl('cartCount').innerText = carrinho.reduce((a,b)=>a+b.q,0);
}
function finalPedido() { if(!usuario.n || !usuario.e) return alert("Complete seu cadastro!"); const msg = `🌟 *PEDIDO IDOLVERSE*%0A👤 Cliente: ${usuario.n}%0A📍 Entrega: ${usuario.e}, Nº ${usuario.num}%0A📮 CEP: ${usuario.c}%0A💰 Total: ${getEl('totalTxt').innerText}`; window.open(`https://wa.me/5591986122614?text=${msg}`, '_blank'); }
function toggleCarrinho() { const c = getEl('carrinho'); const o = getEl('overlay'); const open = c.style.right === "0px"; c.style.right = open ? "-100%" : "0px"; o.style.display = open ? "none" : "block"; }
function buscar(t) { renderizarProdutos(database.filter(p => p.name.toLowerCase().includes(t.toLowerCase()))); }
function filtrarCategoria(el, cat) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); renderizarProdutos(cat === '' ? database : database.filter(p => p.cat === cat)); }
function toggleFav(b,n) { const x = favoritos.indexOf(n); if(x===-1) { favoritos.push(n); b.style.color='#ff4fd8'; } else { favoritos.splice(x,1); b.style.color='#fff'; } localStorage.setItem('iv_fav_v21', JSON.stringify(favoritos)); }
function sToast() { getEl('toast').style.display='block'; setTimeout(()=>getEl('toast').style.display='none', 2000); }
function logout() { localStorage.clear(); location.reload(); }
function abrirPerfil() { getEl('profilePage').style.display='flex'; }
function fecharPerfil() { getEl('profilePage').style.display='none'; }
function abrirZoom() { getEl('zoomImg').src = getEl('ppImg').src; getEl('zoomModal').style.display='flex'; }
</script>
