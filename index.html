<style>
:root {
  --bg-dark: #0a0a14;
  --card-purple: #16162d;
  --primary-pink: #ff4fd8;
  --text-white: #ffffff;
  --violet-accent: #8a2be2;
  --success-green: #00ff88;
  --pix-color: #32BCAD;
  --border: rgba(255, 255, 255, 0.1);
}

/* Reset e Suavidade Mobile */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: var(--bg-dark);
  color: var(--text-white);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
header {
  background: #0a0a14;
  padding: 12px 15px;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid var(--border);
}
.header-top { display: flex; align-items: center; gap: 10px; width: 100%; }
.logo { cursor: pointer; font-size: 22px; font-weight: 900; color: var(--primary-pink); letter-spacing: -1.5px; }

.search-container { flex-grow: 1; position: relative; }
.search-container input {
  width: 100%; padding: 10px 10px 10px 35px; border-radius: 10px;
  border: 1px solid var(--border); background: #1c1c3a; color: #fff; font-size: 14px;
}
.search-container::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

.user-btn { background: var(--primary-pink); color: white; width: 42px; height: 42px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.nav-menu { display: flex; overflow-x: auto; gap: 18px; padding: 15px 0 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.nav-menu::-webkit-scrollbar { display: none; }
.nav-item { color: #888; text-decoration: none; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
.nav-item.active { color: var(--primary-pink); border-bottom: 2px solid var(--primary-pink); }

/* ===== GRID PRODUTOS ===== */
.container { max-width: 1200px; margin: 0 auto; padding-top: 15px; padding-bottom: 80px; }
.products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; }
@media (min-width: 768px) { .products { grid-template-columns: repeat(4, 1fr); gap: 20px; } }

.card {
  background: var(--card-purple); border-radius: 18px; overflow: hidden;
  border: 1px solid var(--border); position: relative; transition: 0.3s;
}
.img-container { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #000; cursor: pointer; }
.img-container img { width: 100%; height: 100%; object-fit: cover; }
.card-info { padding: 12px; }
.card-info h3 { font-size: 12px; margin: 0; height: 34px; overflow: hidden; color: #fff; font-weight: 600; }
.price { color: var(--primary-pink); font-size: 16px; font-weight: 800; display: block; margin: 5px 0; }
.btn-buy-card { background: #fff; color: #000; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: 800; font-size: 10px; cursor: pointer; }

/* ===== CARRINHO COM CHECKOUT E TROCA DE ACABAMENTO ===== */
#carrinho { position: fixed; top: 0; right: -100%; width: 100%; max-width: 480px; height: 100vh; background: #0f0f1e; z-index: 4000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -10px 0 50px rgba(0,0,0,0.8); }
.cart-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
#listaCarrinho { flex: 1; overflow-y: auto; padding: 15px; }

/* Estilo do Item no Carrinho com Seletor */
.item-cart { display: flex; align-items: flex-start; gap: 12px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
.item-cart img { width: 65px; height: 65px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.item-cart-details { flex: 1; min-width: 0; }
.item-cart-details h4 { margin: 0 0 5px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Mini seletor de acabamento dentro do cart */
.finish-toggle { display: flex; background: #0a0a14; padding: 4px; border-radius: 8px; margin-top: 5px; width: fit-content; border: 1px solid #333; }
.finish-toggle div { padding: 4px 8px; font-size: 9px; font-weight: 700; border-radius: 6px; cursor: pointer; opacity: 0.5; }
.finish-toggle .active { background: var(--primary-pink); color: white; opacity: 1; }

.cart-qty-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.cart-qty-row b { color: var(--primary-pink); font-size: 14px; }

/* Checkout & Rodapé */
.cart-footer { padding: 25px; background: #05050a; border-top: 2px solid var(--primary-pink); overflow-y: auto; max-height: 70vh; }
.checkout-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
.checkout-box h4 { font-size: 11px; color: var(--primary-pink); margin: 0 0 10px 0; text-transform: uppercase; font-weight: 800; }
.cart-input { width: 100%; background: #1c1c3a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; font-family: 'Montserrat', sans-serif; }

.frete-card { display: flex; justify-content: space-between; align-items: center; background: #16162d; padding: 10px; border-radius: 12px; margin-top: 8px; cursor: pointer; border: 1px solid transparent; font-size: 13px; }
.frete-card input { display: none; }
.frete-card:has(input:checked) { border-color: var(--primary-pink); background: rgba(255, 79, 216, 0.1); }

/* PÁGINA PRODUTO MODAL */
#productPage { position: fixed; inset: 0; background: var(--bg-dark); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.pp-header { position: sticky; top: 0; background: #0a0a14; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
.pp-main { display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; padding: 15px; width: 100%; }
.pp-image-viewer { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.pp-image-viewer img { max-width: 100%; max-height: 100%; object-fit: contain; }

/* AUXILIARES */
#cartBtn { position: fixed; bottom: 20px; right: 20px; background: var(--primary-pink); width: 60px; height: 60px; border-radius: 50%; z-index: 2000; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(255, 79, 216, 0.4); border: none; color: white; cursor: pointer; }
#cartCount { position: absolute; top: 5px; right: 5px; background: white; color: var(--primary-pink); font-size: 10px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 3500; }
.btn-finalizar { background: #25d366; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; font-size: 15px; transition: 0.3s; }
.main-footer { background: #05050a; padding: 40px 20px; border-top: 1px solid var(--border); margin-top: 30px; text-align: center; }
.credits { text-align: center; padding: 25px; background: #05050a; font-size: 10px; color: #333; }
#profilePage { position: fixed; inset: 0; background: var(--bg-dark); z-index: 5000; display: none; flex-direction: column; overflow-y: auto; }
</style>

function getEl(id) { return document.getElementById(id); }

function carregarTudo() {
  favoritos = JSON.parse(localStorage.getItem('iv_fav_v21')) || [];
  carrinho = JSON.parse(localStorage.getItem('iv_cart_v21')) || [];
  usuario = JSON.parse(localStorage.getItem('iv_user_v21')) || { n: '', e: '', num: '', c: '', z: '', fav: '' };
  
  if(getEl('profNome')) getEl('profNome').value = usuario.n;
  if(getEl('profZap')) getEl('profZap').value = usuario.z;
  if(getEl('profFav')) getEl('profFav').value = usuario.fav;
  if(getEl('cartEnd')) getEl('cartEnd').value = usuario.e;
  if(getEl('cartNum')) getEl('cartNum').value = usuario.num;
  if(getEl('cartCep')) getEl('cartCep').value = usuario.c;

  renderizarProdutos(database); 
  renderizarCarrinho();
  atualizarLabels();
}

function salvarTudoAoDigitar() {
    usuario.n = getEl('profNome').value; usuario.z = getEl('profZap').value; usuario.fav = getEl('profFav').value;
    usuario.e = getEl('cartEnd').value; usuario.num = getEl('cartNum').value; usuario.c = getEl('cartCep').value;
    localStorage.setItem('iv_user_v21', JSON.stringify(usuario));
    atualizarLabels();
}

function atualizarLabels() {
    if(getEl('profileNameDisplay')) getEl('profileNameDisplay').innerText = usuario.n || "Visitante";
    if(getEl('avatarIcon')) getEl('avatarIcon').innerText = (usuario.n || "?").charAt(0).toUpperCase();
    if(getEl('userBtnLabel')) getEl('userBtnLabel').innerText = usuario.n ? usuario.n.split(' ')[0] : "Entrar";
    if(getEl('cartEndResumo')) getEl('cartEndResumo').innerText = usuario.e ? usuario.e + ", Nº " + usuario.num : "Defina no Perfil";
}

function renderizarProdutos(lista) {
  const grid = getEl('productGrid'); if(!grid) return;
  grid.innerHTML = '';
  lista.forEach(p => {
    const isFav = favoritos.includes(p.name);
    grid.innerHTML += `<div class="card"><div style="position:absolute; top:8px; right:8px; z-index:5;"><button onclick="toggleFav(this, '${p.name}')" style="background:rgba(0,0,0,0.5); border:none; color:${isFav?'#ff4fd8':'#fff'}; border-radius:50%; width:30px; height:30px;">❤️</button></div><div class="img-container" onclick="abrirPP(${p.id})"><img src="${p.img}" onerror="this.src='https://placehold.co/300x450?text=Indisponivel'"></div><div class="card-info"><h3>${p.name}</h3><span class="price">R$ ${p.price.toFixed(2).replace('.',',')}</span><button class="btn-buy-card" onclick="addFinal(${p.id}, false)">COMPRAR</button></div></div>`;
  });
}

function abrirPP(id) {
  const p = database.find(x => x.id === id);
  getEl('ppImg').src = p.img; getEl('ppTitle').innerText = p.name; getEl('ppDesc').innerText = p.desc;
  getEl('ppThumbs').innerHTML = `<img src="${p.img}" class="active" onclick="document.getElementById('ppImg').src=this.src"><img src="${FOTO_TAMANHO_G}" onclick="document.getElementById('ppImg').src=this.src">`;
  getEl('ppAddBtn').onclick = () => { addFinal(p.id, false); fecharPP(); };
  getEl('productPage').style.display = 'flex';
}

function fecharPP() { getEl('productPage').style.display = 'none'; }
function toggleCarrinho() { const c = getEl('carrinho'); const o = getEl('overlay'); const open = c.style.right === '0px'; c.style.right = open ? '-100%' : '0px'; o.style.display = open ? 'none' : 'block'; }
function addFinal(id, isP) {
  const p = database.find(x => x.id === id);
  const cartKey = id + (isP ? '_P' : '_S');
  const exist = carrinho.find(i => i.cartKey === cartKey);
  if(exist) exist.q++; else carrinho.push({ ...p, cartKey, q:1, isP, pFinal: isP ? 28.90 : 23.90 });
  localStorage.setItem('iv_cart_v21', JSON.stringify(carrinho)); renderizarCarrinho(); sToast();
}

function renderizarCarrinho() {
  const lista = getEl('listaCarrinho'); if(!lista) return;
  lista.innerHTML = '';
  carrinho.forEach(item => {
    lista.innerHTML += `
      <div class="item-cart">
        <img src="${item.img}">
        <div class="item-cart-info">
          <h4>${item.name}</h4>
          <div class="finish-toggle">
            <div class="${!item.isP?'active':''}" onclick="mudarTipo('${item.cartKey}', false)">Padrão</div>
            <div class="${item.isP?'active':''}" onclick="mudarTipo('${item.cartKey}', true)">Plastificado</div>
          </div>
          <div class="cart-qty-row">
            <div><button onclick="upQ('${item.cartKey}',-1)">-</button><span style="margin:0 8px">${item.q}</span><button onclick="upQ('${item.cartKey}',1)">+</button></div>
            <b>R$ ${(item.pFinal * item.q).toFixed(2)}</b>
          </div>
        </div>
      </div>`;
  });
  upT();
}

function mudarTipo(k, status) {
    const item = carrinho.find(x => x.cartKey === k);
    item.isP = status;
    item.pFinal = status ? 28.90 : 23.90;
    // Precisamos atualizar o cartKey para evitar bugs de id duplicados no filtro posterior
    localStorage.setItem('iv_cart_v21', JSON.stringify(carrinho)); renderizarCarrinho();
}

function upQ(k, n) {
  const i = carrinho.find(x => x.cartKey === k); i.q += n;
  if(i.q <= 0) carrinho = carrinho.filter(x => x.cartKey !== k);
  localStorage.setItem('iv_cart_v21', JSON.stringify(carrinho)); renderizarCarrinho();
}

function calcFrete() { if(!usuario.c) return alert("Preencha o CEP"); getEl('freteResult').style.display = 'block'; upT(); }
function upT() {
  let sub = carrinho.reduce((a,b)=> a + (b.pFinal * b.q), 0);
  let frete = (getEl('freteResult').style.display === 'block') ? parseFloat(document.querySelector('input[name="f"]:checked').value) : 0;
  getEl('totalTxt').innerText = `R$ ${(sub + frete).toFixed(2).replace('.',',')}`;
  getEl('cartCount').innerText = carrinho.reduce((a,b)=>a+b.q,0);
}

function finalizarPedido() {
  if(!usuario.n || !usuario.e || !usuario.c) return alert("Complete os dados no carrinho!");
  const itens = carrinho.map(i => `• ${i.q}x ${i.name} [${i.isP?'Plastificado':'Normal'}]`).join('%0A');
  window.open(`https://wa.me/5591986122614?text=🌟 PEDIDO IDOLVERSE%0A👤 Cliente: ${usuario.n}%0A📍 Entrega: ${usuario.e}, Nº ${usuario.num}%0A📮 CEP: ${usuario.c}%0A📦 Itens:%0A${itens}%0A💰 Total: ${getEl('totalTxt').innerText}`, '_blank');
}

function toggleFav(btn, nome) {
  const idx = favoritos.indexOf(nome); if(idx === -1) { favoritos.push(nome); btn.style.color = '#ff4fd8'; }
  else { favoritos.splice(idx,1); btn.style.color = '#fff'; }
  localStorage.setItem('iv_fav_v21', JSON.stringify(favoritos));
}
function sToast() { getEl('toast').style.display='block'; setTimeout(()=>getEl('toast').style.display='none', 2000); }
function logout() { localStorage.clear(); location.reload(); }
function abrirPerfil() { getEl('profilePage').style.display = 'flex'; }
function fecharPerfil() { getEl('profilePage').style.display = 'none'; }
function abrirZoom() { getEl('zoomImg').src = getEl('ppImg').src; getEl('zoomModal').style.display = 'flex'; }
function buscar(t) { renderizarProdutos(database.filter(p => p.name.toLowerCase().includes(t.toLowerCase()))); }
function filtrarCategoria(el, cat) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); renderizarProdutos(cat === '' ? database : database.filter(p => p.cat === cat)); }
</script>
</body>
</html>
